<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShipEngine Webhook Simulator</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 2px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not- adolescence; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-size: 14px; line-height: 1.4; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📦 Webhook Simulator</h2>
        
        <div class="field">
            <label>Webhook.site URL</label>
            <input type="text" id="target_url" placeholder="https://webhook.site/...">
        </div>

        <div class="field">
            <label>Tracking Number</label>
            <input type="text" id="tracking_number" placeholder="Enter tracking number..." value="399933278930">
        </div>

        <div class="field">
            <label>Carrier</label>
            <select id="carrier">
                <option value="fedex">FedEx</option>
                <option value="ups">UPS (Coming Soon)</option>
                <option value="usps">USPS (Coming Soon)</option>
            </select>
        </div>

        <div class="field">
            <label>Target Status</label>
            <select id="status">
                <option value="AC">Accepted (AC)</option>
                <option value="IT">In Transit (IT)</option>
                <option value="DE" selected>Delivered (DE)</option>
            </select>
        </div>

        <button id="fire-btn" onclick="fire()">Fire Webhook 🔥</button>
        <div id="status-box"></div>
    </div>

    <script>
        async function fire() {
            const box = document.getElementById('status-box');
            const btn = document.getElementById('fire-btn');
            
            const payload = {
                target_url: document.getElementById('target_url').value,
                carrier: document.getElementById('carrier').value,
                tracking_number: document.getElementById('tracking_number').value,
                status: document.getElementById('status').value
            };

            if (!payload.target_url) {
                alert("Please enter your Webhook.site URL first!");
                return;
            }

            btn.disabled = true;
            box.style.display = 'none';

            try {
                const response = await fetch('/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (response.ok) {
                    box.className = 'status-box success';
                    box.innerText = `✅ Success!\nCarrier: ${payload.carrier}\nStatus: ${payload.status}\nTracking: ${payload.tracking_number}`;
                } else {
                    box.className = 'status-box error';
                    box.innerText = `❌ Error: ${result.error}\n${result.details || ''}`;
                }
            } catch (e) {
                box.className = 'status-box error';
                box.innerText = "❌ Connection failed. Is the server running?";
            } finally {
                box.style.display = 'block';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
